<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6366f1">
<title>iQR - Gerador de QR Code</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --secondary: #ec4899;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --text-light: #64748b;
    --border: #e2e8f0;
    --success: #10b981;
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    color: var(--text);
    padding: 20px 16px;
    padding-bottom: 40px;
  }
  
  .container {
    max-width: 480px;
    margin: 0 auto;
  }
  
  .header {
    text-align: center;
    margin-bottom: 24px;
    color: white;
  }
  
  .logo {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -2px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.2);
    background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
    -webkit-background-clip: text;    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .logo span {
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .tagline {
    font-size: 14px;
    opacity: 0.9;
    margin-top: 4px;
    font-weight: 500;
  }
  
  .card {
    background: var(--card);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    margin-bottom: 16px;
  }
  
  .input-group {
    margin-bottom: 16px;
  }
  
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }
  
  .input-icon {
    position: absolute;
    left: 16px;
    color: var(--text-light);    font-size: 18px;
  }
  
  input[type="text"], input[type="url"] {
    width: 100%;
    padding: 16px 16px 16px 48px;
    border: 2px solid var(--border);
    border-radius: 14px;
    font-size: 15px;
    transition: all 0.3s;
    background: var(--bg);
    color: var(--text);
  }
  
  input:focus {
    outline: none;
    border-color: var(--primary);
    background: white;
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
  }
  
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  
  .option-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  
  .option-item label {
    margin: 0;
    font-size: 11px;
  }
  
  .color-picker {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
  }
  
  input[type="color"] {    width: 28px;
    height: 28px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    background: none;
    padding: 0;
  }
  
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: 2px solid white; border-radius: 50%; }
  
  .color-picker span {
    font-size: 12px;
    color: var(--text-light);
    font-weight: 500;
  }
  
  select {
    width: 100%;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
  }
  
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  
  .btn-primary {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
  }
    .btn-primary:active {
    transform: scale(0.98);
    box-shadow: 0 4px 10px rgba(99, 102, 241, 0.4);
  }
  
  .qr-container {
    display: none;
    text-align: center;
    padding: 24px;
    background: white;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    margin-bottom: 16px;
    animation: slideUp 0.4s ease;
  }
  
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .qr-container.active { display: block; }
  
  .qr-wrapper {
    display: inline-block;
    padding: 16px;
    background: white;
    border-radius: 16px;
    border: 3px solid var(--bg);
    margin-bottom: 16px;
  }
  
  #qrcode {
    display: flex;
    justify-content: center;
  }
  
  #qrcode img, #qrcode canvas {
    border-radius: 8px;
  }
  
  .qr-url {
    font-size: 12px;
    color: var(--text-light);
    word-break: break-all;
    margin-bottom: 16px;
    padding: 10px;
    background: var(--bg);
    border-radius: 10px;
    max-height: 60px;    overflow-y: auto;
  }
  
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  
  .btn-action {
    padding: 12px;
    border: 2px solid var(--border);
    background: white;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
  }
  
  .btn-action:active {
    transform: scale(0.96);
    background: var(--bg);
  }
  
  .btn-action.success {
    background: var(--success);
    color: white;
    border-color: var(--success);
  }
  
  .history {
    background: var(--card);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  
  .history-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;    justify-content: space-between;
  }
  
  .clear-btn {
    font-size: 11px;
    color: var(--secondary);
    background: none;
    border: none;
    cursor: pointer;
    font-weight: 600;
  }
  
  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    background: var(--bg);
    border-radius: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .history-item:active { transform: scale(0.98); }
  
  .history-item:last-child { margin-bottom: 0; }
  
  .history-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 16px;
    flex-shrink: 0;
  }
  
  .history-text {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
    .empty-history {
    text-align: center;
    padding: 20px;
    color: var(--text-light);
    font-size: 13px;
  }
  
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: transform 0.3s;
    z-index: 1000;
  }
  
  .toast.show { transform: translateX(-50%) translateY(0); }
  
  .footer {
    text-align: center;
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    margin-top: 24px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">i<span>QR</span></div>
      <div class="tagline">⚡ QR Codes em segundos</div>
    </div>
    
    <div class="card">
      <div class="input-group">
        <label>🔗 Cole seu link aqui</label>
        <div class="input-wrapper">
          <span class="input-icon">🌐</span>
          <input type="url" id="urlInput" placeholder="https://exemplo.com" autocomplete="off">
        </div>
      </div>
      
      <div class="options">        <div class="option-item">
          <label>Cor do QR</label>
          <div class="color-picker">
            <input type="color" id="qrColor" value="#6366f1">
            <span id="colorLabel">#6366f1</span>
          </div>
        </div>
        <div class="option-item">
          <label>Tamanho</label>
          <select id="qrSize">
            <option value="200">Pequeno</option>
            <option value="280" selected>Médio</option>
            <option value="360">Grande</option>
          </select>
        </div>
      </div>
      
      <button class="btn btn-primary" onclick="generateQR()">
        ⚡ Gerar QR Code
      </button>
    </div>
    
    <div class="qr-container" id="qrContainer">
      <div class="qr-wrapper">
        <div id="qrcode"></div>
      </div>
      <div class="qr-url" id="qrUrl"></div>
      <div class="actions">
        <button class="btn-action" onclick="downloadQR()">
          📥 Baixar PNG
        </button>
        <button class="btn-action" onclick="copyLink()">
          📋 Copiar Link
        </button>
      </div>
    </div>
    
    <div class="history">
      <div class="history-title">
        <span>📜 Histórico Recente</span>
        <button class="clear-btn" onclick="clearHistory()">Limpar</button>
      </div>
      <div id="historyList">
        <div class="empty-history">Nenhum QR Code gerado ainda</div>
      </div>
    </div>
    
    <div class="footer">
      iQR © 2026 • Feito com 💜
    </div>  </div>
  
  <div class="toast" id="toast"></div>

<script>
  let qrInstance = null;
  let currentUrl = '';
  
  const urlInput = document.getElementById('urlInput');
  const qrColor = document.getElementById('qrColor');
  const colorLabel = document.getElementById('colorLabel');
  const qrSize = document.getElementById('qrSize');
  
  qrColor.addEventListener('input', (e) => {
    colorLabel.textContent = e.target.value;
  });
  
  urlInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') generateQR();
  });
  
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }
  
  function normalizeUrl(url) {
    url = url.trim();
    if (!url) return '';
    if (!/^https?:\/\//i.test(url)) {
      url = 'https://' + url;
    }
    return url;
  }
  
  function generateQR() {
    const url = normalizeUrl(urlInput.value);
    if (!url || url === 'https://') {
      showToast('⚠️ Digite um link válido');
      return;
    }
    
    currentUrl = url;
    const size = parseInt(qrSize.value);
    const color = qrColor.value;
    const qrDiv = document.getElementById('qrcode');
    qrDiv.innerHTML = '';
        qrInstance = new QRCode(qrDiv, {
      text: url,
      width: size,
      height: size,
      colorDark: color,
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
    
    document.getElementById('qrUrl').textContent = url;
    document.getElementById('qrContainer').classList.add('active');
    
    saveToHistory(url);
    showToast('✅ QR Code gerado!');
    
    setTimeout(() => {
      document.getElementById('qrContainer').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
  
  function downloadQR() {
    const canvas = document.querySelector('#qrcode canvas');
    const img = document.querySelector('#qrcode img');
    let dataUrl;
    
    if (canvas) {
      dataUrl = canvas.toDataURL('image/png');
    } else if (img) {
      dataUrl = img.src;
    } else {
      showToast('❌ Erro ao baixar');
      return;
    }
    
    const link = document.createElement('a');
    link.download = 'iqr-' + Date.now() + '.png';
    link.href = dataUrl;
    link.click();
    showToast('📥 Download iniciado!');
  }
  
  function copyLink() {
    if (!currentUrl) return;
    navigator.clipboard.writeText(currentUrl).then(() => {
      showToast('📋 Link copiado!');
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = currentUrl;
      document.body.appendChild(ta);
      ta.select();      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('📋 Link copiado!');
    });
  }
  
  function saveToHistory(url) {
    let history = JSON.parse(localStorage.getItem('iqr_history') || '[]');
    history = history.filter(h => h !== url);
    history.unshift(url);
    history = history.slice(0, 5);
    localStorage.setItem('iqr_history', JSON.stringify(history));
    renderHistory();
  }
  
  function renderHistory() {
    const list = document.getElementById('historyList');
    const history = JSON.parse(localStorage.getItem('iqr_history') || '[]');
    
    if (history.length === 0) {
      list.innerHTML = '<div class="empty-history">Nenhum QR Code gerado ainda</div>';
      return;
    }
    
    list.innerHTML = history.map(url => `
      <div class="history-item" onclick="loadFromHistory('${url.replace(/'/g, "\\'")}')">
        <div class="history-icon">📱</div>
        <div class="history-text">${url}</div>
      </div>
    `).join('');
  }
  
  function loadFromHistory(url) {
    urlInput.value = url;
    generateQR();
  }
  
  function clearHistory() {
    localStorage.removeItem('iqr_history');
    renderHistory();
    showToast('🗑️ Histórico limpo');
  }
  
  renderHistory();
</script>
</body>
</html>
