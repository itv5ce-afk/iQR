<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>iQR - Gerador de QR Code</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    display: flex;
    justify-content: center;
    padding: 20px 10px;
  }
  .app {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.97);
    border-radius: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    backdrop-filter: blur(10px);
  }
  .header {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    padding: 24px 20px;
    text-align: center;
    color: white;
    position: relative;
  }
  .logo {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: white;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6366f1;
    font-size: 26px;    font-weight: 900;
  }
  .subtitle {
    font-size: 13px;
    opacity: 0.9;
    margin-top: 4px;
    font-weight: 500;
  }
  .tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    padding: 16px 12px 8px;
    gap: 6px;
    background: #f8f9ff;
  }
  .tab {
    padding: 10px 4px;
    border: none;
    background: transparent;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    color: #6b7280;
    transition: all 0.25s;
  }
  .tab-icon {
    font-size: 22px;
    width: 38px; height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    background: #eef0ff;
  }
  .tab.active {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(99,102,241,0.4);
  }
  .tab.active .tab-icon { background: rgba(255,255,255,0.25); color: white; }
  .content { padding: 20px; }
  .form-group { margin-bottom: 14px; }
  label {
    display: block;    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
  }
  input, textarea, select {
    width: 100%;
    padding: 13px 14px;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    transition: border 0.2s;
    background: #fafbff;
  }
  input:focus, textarea:focus, select:focus {
    border-color: #6366f1;
    background: white;
  }
  textarea { resize: none; min-height: 70px; font-family: inherit; }
  .btn-generate {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 0 8px 20px rgba(99,102,241,0.35);
    transition: transform 0.15s;
  }
  .btn-generate:active { transform: scale(0.97); }
  .qr-container {
    margin-top: 20px;
    padding: 20px;
    background: white;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    display: none;
  }
  .qr-container.show { display: block; animation: fadeIn 0.4s; }
  @keyframes fadeIn { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }
  #qrcode {
    display: inline-block;
    padding: 12px;
    background: white;    border-radius: 12px;
  }
  #qrcode img, #qrcode canvas { border-radius: 8px; display: block; }
  .btn-download {
    margin-top: 14px;
    padding: 11px 24px;
    background: #10b981;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  .btn-download:active { background: #059669; }
  .footer {
    text-align: center;
    padding: 14px;
    font-size: 11px;
    color: #9ca3af;
    border-top: 1px solid #f3f4f6;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo"><div class="logo-icon">Q</div> iQR</div>
    <div class="subtitle">Crie QR Codes em segundos ⚡</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-type="link">
      <div class="tab-icon">🔗</div>Link
    </button>
    <button class="tab" data-type="whatsapp">
      <div class="tab-icon">💬</div>WhatsApp
    </button>
    <button class="tab" data-type="wifi">
      <div class="tab-icon">📶</div>Wi-Fi
    </button>
    <button class="tab" data-type="pix">
      <div class="tab-icon">💰</div>Pix
    </button>
  </div>

  <div class="content">
    <!-- LINK -->    <div class="form-section" id="form-link">
      <div class="form-group">
        <label>URL do site</label>
        <input type="url" id="linkUrl" placeholder="https://exemplo.com">
      </div>
    </div>

    <!-- WHATSAPP -->
    <div class="form-section hidden" id="form-whatsapp">
      <div class="form-group">
        <label>Número (com DDI + DDD)</label>
        <input type="tel" id="wppNumber" placeholder="5511999998888">
      </div>
      <div class="form-group">
        <label>Mensagem (opcional)</label>
        <textarea id="wppMsg" placeholder="Olá! Vi seu QR Code..."></textarea>
      </div>
    </div>

    <!-- WI-FI -->
    <div class="form-section hidden" id="form-wifi">
      <div class="form-group">
        <label>Nome da rede (SSID)</label>
        <input type="text" id="wifiSsid" placeholder="MinhaRede">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="text" id="wifiPass" placeholder="senha123">
      </div>
      <div class="form-group">
        <label>Tipo de segurança</label>
        <select id="wifiType">
          <option value="WPA">WPA/WPA2</option>
          <option value="WEP">WEP</option>
          <option value="nopass">Sem senha</option>
        </select>
      </div>
    </div>

    <!-- PIX -->
    <div class="form-section hidden" id="form-pix">
      <div class="form-group">
        <label>Chave Pix</label>
        <input type="text" id="pixKey" placeholder="CPF, e-mail, telefone ou aleatória">
      </div>
      <div class="form-group">
        <label>Nome do favorecido</label>
        <input type="text" id="pixName" placeholder="JOAO SILVA" maxlength="25">
      </div>
      <div class="form-group">        <label>Cidade</label>
        <input type="text" id="pixCity" placeholder="SAO PAULO" maxlength="15">
      </div>
      <div class="form-group">
        <label>Valor (opcional)</label>
        <input type="number" id="pixValue" step="0.01" placeholder="0.00">
      </div>
    </div>

    <button class="btn-generate" onclick="generateQR()">⚡ Gerar QR Code</button>

    <div class="qr-container" id="qrContainer">
      <div id="qrcode"></div>
      <button class="btn-download" onclick="downloadQR()">⬇️ Baixar QR Code</button>
    </div>
  </div>

  <div class="footer">iQR © 2026 • Gerador rápido e gratuito</div>
</div>

<script>
  // Troca de abas
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-section').forEach(f => f.classList.add('hidden'));
      tab.classList.add('active');
      document.getElementById('form-' + tab.dataset.type).classList.remove('hidden');
      document.getElementById('qrContainer').classList.remove('show');
    });
  });

  let qrInstance = null;

  function generateQR() {
    const type = document.querySelector('.tab.active').dataset.type;
    let data = '';

    try {
      if (type === 'link') {
        data = document.getElementById('linkUrl').value.trim();
        if (!data) return alert('Digite uma URL válida.');
        if (!/^https?:\/\//i.test(data)) data = 'https://' + data;
      }
      else if (type === 'whatsapp') {
        const num = document.getElementById('wppNumber').value.replace(/\D/g,'');
        const msg = document.getElementById('wppMsg').value.trim();
        if (!num) return alert('Digite o número.');
        data = 'https://wa.me/' + num + (msg ? '?text=' + encodeURIComponent(msg) : '');
      }      else if (type === 'wifi') {
        const ssid = document.getElementById('wifiSsid').value.trim();
        const pass = document.getElementById('wifiPass').value;
        const t = document.getElementById('wifiType').value;
        if (!ssid) return alert('Digite o nome da rede.');
        data = `WIFI:T:${t};S:${ssid};P:${pass};;`;
      }
      else if (type === 'pix') {
        const key = document.getElementById('pixKey').value.trim();
        const name = document.getElementById('pixName').value.trim().toUpperCase();
        const city = document.getElementById('pixCity').value.trim().toUpperCase();
        const val = document.getElementById('pixValue').value;
        if (!key || !name || !city) return alert('Preencha chave, nome e cidade.');
        data = buildPixPayload(key, name, city, val);
      }
    } catch(e) { return alert('Erro: ' + e.message); }

    document.getElementById('qrcode').innerHTML = '';
    qrInstance = new QRCode(document.getElementById('qrcode'), {
      text: data,
      width: 240,
      height: 240,
      colorDark: "#1a1a2e",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
    document.getElementById('qrContainer').classList.add('show');
  }

  // Monta payload Pix EMV completo (padrão BR Code)
  function buildPixPayload(key, name, city, value) {
    const t = (id, val) => {
      const v = String(val);
      return id.toString().padStart(2,'0') + v.length.toString().padStart(2,'0') + v;
    };
    // Merchant Account Information (ID 26)
    const gui = t(0, 'br.gov.bcb.pix');
    const acc = t(26, gui + t(1, key));
    let payload = t(0, '01') + acc + t(52, '0000') + t(53, '986');
    if (value && parseFloat(value) > 0) {
      payload += t(54, parseFloat(value).toFixed(2));
    }
    payload += t(58, 'BR') + t(59, name.substring(0,25)) + t(60, city.substring(0,15));
    payload += t(62, t(5, '***'));
    payload += t(63, '0000'); // CRC reservado
    // Calcula CRC16-CCITT
    const crc = crc16(payload);
    return payload + crc;
  }
  function crc16(str) {
    let crc = 0xFFFF;
    for (let i = 0; i < str.length; i++) {
      crc ^= str.charCodeAt(i) << 8;
      for (let j = 0; j < 8; j++) {
        crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) : (crc << 1);
        crc &= 0xFFFF;
      }
    }
    return crc.toString(16).toUpperCase().padStart(4,'0');
  }

  function downloadQR() {
    const img = document.querySelector('#qrcode img') || document.querySelector('#qrcode canvas');
    if (!img) return;
    const src = img.src || img.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = src;
    a.download = 'iqr-' + Date.now() + '.png';
    a.click();
  }
</script>
</body>
</html>
